/* ─── DIRECTION 1: TERMINAL / MATRIX ─── */
function TerminalCard() {
  const [blink, setBlink] = React.useState(true);
  React.useEffect(() => {
    const t = setInterval(() => setBlink(b => !b), 530);
    return () => clearInterval(t);
  }, []);

  return (
    <div style={{width:'100%',height:'100%',background:'#080d08',display:'flex',flexDirection:'column',fontFamily:"'JetBrains Mono',monospace",padding:32,gap:28,position:'relative',overflow:'hidden'}}>
      {/* scanlines overlay */}

      {/* logo */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,paddingTop:8}}>
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
          <rect x="1" y="1" width="70" height="70" rx="4" stroke="#00ff41" strokeWidth="1.5" strokeDasharray="8 4"/>

          <circle cx="36" cy="36" r="33" stroke="#00ff41" strokeWidth="0.4" opacity="0.3"/>
        </svg>
        <div style={{textAlign:'center'}}>
          <div style={{color:'#00ff41',fontSize:22,fontWeight:700,letterSpacing:4,textTransform:'uppercase'}}>varoserver</div>
          <div style={{color:'rgba(0,255,65,0.4)',fontSize:10,letterSpacing:6,marginTop:3}}>INFRASTRUCTURE v22.8</div>
        </div>
      </div>

      {/* palette */}
      <div style={{display:'flex',gap:6}}>
        {[['#00ff41','--green'],['#003d10','--dark'],['#0aff7a','--bright'],['#080d08','--void'],['#c8ffd8','--mist']].map(([c,n])=>(
          <div key={c} style={{flex:1,display:'flex',flexDirection:'column',gap:4,alignItems:'center'}}>
            <div style={{width:'100%',height:28,background:c,borderRadius:2,border:'1px solid rgba(0,255,65,0.2)'}}/>
            <div style={{color:'rgba(0,255,65,0.5)',fontSize:8,letterSpacing:1}}>{n}</div>

      {/* type sample */}

        <div style={{color:'#00ff41',fontSize:16,fontWeight:700,letterSpacing:2}}>VAROSERVER</div>
        <div style={{color:'rgba(0,255,65,0.6)',fontSize:11,marginTop:4,letterSpacing:1}}>JetBrains Mono — Sistema</div>
        <div style={{color:'rgba(0,255,65,0.5)',fontSize:10,marginTop:6,lineHeight:1.6}}>
          <span style={{color:'rgba(0,255,65,0.3)'}}>$ </span>uptime 22d 14h — nominal<br/>
          <span style={{color:'rgba(0,255,65,0.3)'}}>$ </span>services: 42 running{blink?'▋':' '}
        </div>
      </div>

      {/* UI sample */}
      <div style={{border:'1px solid rgba(0,255,65,0.2)',borderRadius:3,padding:14,background:'rgba(0,255,65,0.02)',flex:1}}>
        <div style={{color:'rgba(0,255,65,0.4)',fontSize:9,letterSpacing:3,marginBottom:10}}>COMPONENTE — STATUS BADGE</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>

      <div style={{borderTop:'1px solid rgba(0,255,65,0.15)',paddingTop:16}}>
        <div style={{color:'rgba(0,255,65,0.3)',fontSize:9,letterSpacing:3,marginBottom:8}}>SUB-MARCA — DIANE</div>

            <div style={{color:'rgba(125,249,255,0.5)',fontSize:9,letterSpacing:1}}>Engineering Partner · OpenClaw</div>

        </div>
      </div>
    </div>
  );
}

/* ─── DIRECTION 4: SYNTHWAVE ─── */
function SynthwaveCard() {
  return (
    <div style={{width:'100%',height:'100%',background:'linear-gradient(180deg,#0d0019 0%,#1a0035 60%,#2d0050 100%)',display:'flex',flexDirection:'column',fontFamily:"'JetBrains Mono',monospace",padding:32,gap:24,position:'relative',overflow:'hidden'}}>
      {/* retrowave grid floor */}
      <svg style={{position:'absolute',bottom:0,left:0,right:0,width:'100%',height:'220px',opacity:0.25}} viewBox="0 0 540 220" preserveAspectRatio="none">
        <defs>
          <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#b026ff" stopOpacity="0.8"/>
            <stop offset="100%" stopColor="#b026ff" stopOpacity="0.1"/>
          </linearGradient>
        </defs>
        {/* horizontal lines */}
        {[0.15,0.3,0.45,0.6,0.75,0.9,1].map((t,i)=>(
          <line key={i} x1="0" y1={220*t} x2="540" y2={220*t} stroke="url(#gridFade)" strokeWidth="0.8"/>
        ))}
        {/* vertical lines converging */}
        {[-4,-3,-2,-1,0,1,2,3,4].map((v,i)=>(
          <line key={i} x1={270+v*80} y1="0" x2={270+v*1200} y2="220" stroke="url(#gridFade)" strokeWidth="0.8"/>
        ))}
      </svg>
      {/* glow orbs */}
      <div style={{position:'absolute',top:'15%',left:'50%',transform:'translateX(-50%)',width:200,height:80,background:'radial-gradient(ellipse,rgba(176,38,255,0.3),transparent 70%)',filter:'blur(20px)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:'10%',left:'20%',width:80,height:80,background:'radial-gradient(circle,rgba(1,205,254,0.2),transparent 70%)',filter:'blur(15px)',pointerEvents:'none'}}/>

              <div key={k} style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:20,height:20,borderRadius:4,background:v,flexShrink:0,boxShadow:`0 0 8px ${v}40`}}/>
                <code style={{color:C.mauve,fontSize:9,letterSpacing:0.5,width:80,flexShrink:0}}>{k}</code>
                <span style={{color:C.overlay,fontSize:9}}>{d}</span>
              </div>
            ))}
          </div>
        </div>

        {/* status bar component */}
        <div style={{background:C.surface,borderRadius:8,padding:14,border:C.border}}>
          <div style={{color:C.overlay,fontSize:9,letterSpacing:2,marginBottom:10}}>status bar · system</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[['● NOMINAL','#a6e3a1'],['⚡ 2.1GHz','#cba6f7'],['◉ 8.2GB / 16GB','#89b4fa'],['↑ 22d uptime','#fab387']].map(([t,c])=>(
              <div key={t} style={{borderRadius:20,padding:'3px 10px',border:`1px solid ${c}35`,color:c,fontSize:9,background:`${c}0d`,letterSpacing:0.5,boxShadow:`0 0 8px ${c}20`}}>{t}</div>
            ))}
          </div>
        </div>

        {/* diane hybrid */}
        <div style={{background:`linear-gradient(135deg,rgba(137,180,250,0.06),rgba(203,166,247,0.06))`,borderRadius:8,padding:12,border:`1px solid rgba(137,180,250,0.2)`,marginTop:'auto'}}>
          <div style={{color:C.overlay,fontSize:9,letterSpacing:2,marginBottom:8}}>diane · sub-brand</div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:'rgba(137,180,250,0.1)',border:'1.5px solid rgba(137,180,250,0.4)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 14px rgba(137,180,250,0.2)'}}>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <circle cx="9" cy="7" r="3" stroke="#89b4fa" strokeWidth="1.3"/>
                <path d="M3 17c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#89b4fa" strokeWidth="1.3" strokeLinecap="round"/>
                <circle cx="9" cy="7" r="1" fill="#89b4fa"/>
              </svg>
            </div>
            <div>
              <div style={{background:'linear-gradient(90deg,#89b4fa,#cba6f7)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontSize:13,fontWeight:600,letterSpacing:1.5}}>diane</div>
              <div style={{color:C.overlay,fontSize:9,marginTop:1}}>engineering partner · openclaw · elite</div>
            </div>
            <div style={{marginLeft:'auto',padding:'3px 10px',borderRadius:20,background:'linear-gradient(90deg,rgba(137,180,250,0.15),rgba(203,166,247,0.15))',border:'1px solid rgba(137,180,250,0.25)',fontSize:8,letterSpacing:1,color:C.subtext}}>v22.8</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ─── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showDianeSection": true,
  "artboardHeight": 740
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return {...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('vsb-tweaks')||'{}')}; } catch { return TWEAK_DEFAULTS; }
  });
  const [tweakOpen, setTweakOpen] = React.useState(false);

  React.useEffect(() => {
    localStorage.setItem('vsb-tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  // Tweaks bridge
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const h = tweaks.artboardHeight;

  return (
    <>
      <DesignCanvas>
        <DCSection id="brandsystem" title="Brand System Guide" subtitle="Tokens · Logo vars · Tipografía · Componentes">
          <DCArtboard id="guide" label="Brand Guide · v1.0" width={920} height={h}>
            <BrandSystemCard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="logoexplore" title="Logo Explorations — Constelación" subtitle="V · A · mismo lenguaje de nodos · Catppuccin Mocha">
          <DCArtboard id="logoV" label="Logo · V constellation" width={380} height={h}>
            <LogoVCard/>
          </DCArtboard>
          <DCArtboard id="logoA" label="Logo · A constellation" width={380} height={h}>
            <LogoACard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="logos" title="varoserver — Exploración de Identidad Visual" subtitle="4 direcciones · símbolo + wordmark · paleta · tipografía · Diane sub-brand">
          <DCArtboard id="terminal" label="01 · Terminal / Matrix" width={360} height={h}>
            <TerminalCard/>
          </DCArtboard>
          <DCArtboard id="cyberpunk" label="02 · Cyberpunk Neon" width={360} height={h}>
            <CyberpunkCard/>
          </DCArtboard>
          <DCArtboard id="rice" label="03 · Linux Rice (Catppuccin)" width={360} height={h}>
            <RiceCard/>
          </DCArtboard>
          <DCArtboard id="synthwave" label="04 · Synthwave / Retrowave" width={360} height={h}>
            <SynthwaveCard/>
          </DCArtboard>
        </DCSection>

        <DCSection id="round2" title="Ronda 2 — Refinadas" subtitle="03-A Rice · 04-A Synthwave · Hybrid fusión">
          <DCArtboard id="rice2" label="03-A · Linux Rice Refinado" width={380} height={h}>
            <RiceRefinedCard/>
          </DCArtboard>
          <DCArtboard id="synth2" label="04-A · Synthwave Refinado" width={380} height={h}>
            <SynthwaveRefinedCard/>
          </DCArtboard>
          <DCArtboard id="hybrid" label="★ HYBRID · Rice × Synthwave" width={380} height={h}>
            <HybridCard/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {/* TWEAKS PANEL */}
      {tweakOpen && (
        <div style={{position:'fixed',bottom:24,right:24,background:'#1a1a2e',border:'1px solid rgba(155,48,255,0.4)',borderRadius:10,padding:20,zIndex:9999,width:260,fontFamily:"'JetBrains Mono',monospace",boxShadow:'0 8px 40px rgba(0,0,0,0.6)'}}>
          <div style={{color:'#cba6f7',fontSize:12,fontWeight:600,letterSpacing:2,marginBottom:16}}>TWEAKS</div>
          
          <div style={{marginBottom:14}}>
            <label style={{color:'rgba(255,255,255,0.5)',fontSize:10,letterSpacing:1,display:'block',marginBottom:6}}>ALTURA ARTBOARD</label>
            <input type="range" min={580} max={900} step={20} value={h}
              onChange={e => { const v = {...tweaks, artboardHeight: +e.target.value}; setTweaks(v); window.parent.postMessage({type:'__edit_mode_set_keys',edits:v},'*'); }}
              style={{width:'100%',accentColor:'#9B30FF'}}/>
            <div style={{color:'rgba(255,255,255,0.3)',fontSize:9,marginTop:3}}>{h}px</div>
          </div>

          <div style={{marginBottom:14}}>
            <label style={{color:'rgba(255,255,255,0.5)',fontSize:10,letterSpacing:1,display:'block',marginBottom:6}}>DIANE SUB-BRAND</label>
            <div style={{display:'flex',gap:8}}>
              {[true,false].map(v=>(
                <button key={String(v)} onClick={() => { const u = {...tweaks,showDianeSection:v}; setTweaks(u); window.parent.postMessage({type:'__edit_mode_set_keys',edits:u},'*'); }}
                  style={{flex:1,padding:'5px 0',borderRadius:4,border:`1px solid ${tweaks.showDianeSection===v?'#9B30FF':'rgba(255,255,255,0.15)'}`,background:tweaks.showDianeSection===v?'rgba(155,48,255,0.2)':'transparent',color:tweaks.showDianeSection===v?'#cba6f7':'rgba(255,255,255,0.4)',fontSize:9,cursor:'pointer',letterSpacing:1}}>
                  {v?'VISIBLE':'OCULTO'}
                </button>
              ))}
            </div>
          </div>

          <div style={{borderTop:'1px solid rgba(255,255,255,0.08)',paddingTop:12,color:'rgba(255,255,255,0.25)',fontSize:9,lineHeight:1.6}}>
            Haz zoom/pan en el canvas<br/>Click en etiqueta = focus mode
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
