const ALL_KEY = 'all';

// V constellation logo
function VLogo({size=32, color=C.mauve, aL=C.blue, aR=C.green}) {
  const n = [{x:6,y:8,r:3.5,c:color},{x:17,y:26,r:2.5,c:color,o:0.75},{x:28,y:48,r:4,c:aL},{x:39,y:26,r:2.5,c:color,o:0.75},{x:50,y:8,r:3.5,c:aR},{x:11,y:17,r:1.5,c:color,o:0.45},{x:23,y:37,r:1.5,c:aL,o:0.45},{x:33,y:37,r:1.5,c:aL,o:0.45},{x:45,y:17,r:1.5,c:aR,o:0.45}];
  const e = [[0,5],[5,1],[1,6],[6,2],[4,8],[8,3],[3,7],[7,2]];
  return (
    <svg width={size} height={size} viewBox="-8 0 72 64" fill="none">
      {e.map(([a,b],i)=>(<line key={i} x1={n[a].x} y1={n[a].y} x2={n[b].x} y2={n[b].y} stroke={n[a].c} strokeWidth="1.2" opacity="0.6"/>))}
      {n.map((nd,i)=>(<circle key={i} cx={nd.x} cy={nd.y} r={nd.r} fill={nd.c} opacity={nd.o??1}/>))}
    </svg>
  );
}

function StatusDot({status}) {
  const col = status==='up'?C.green:status==='paused'?C.overlay:C.red;
  return <div style={{width:7,height:7,borderRadius:'50%',background:col,boxShadow:status==='up'?`0 0 6px ${col}`:undefined,flexShrink:0}}/>;
}

function ServiceCard({item, catColor}) {
  const [hovered, setHovered] = React.useState(false);
  const iconFn = ICONS[item.ico];
  return (
    <div
      onMouseEnter={()=>setHovered(true)}
      onMouseLeave={()=>setHovered(false)}
      style={{
        background: hovered ? C.surface0 : C.mantle,
        borderRadius:10,
        padding:'14px 16px',
        border:`1px solid ${hovered ? catColor+'35' : C.surface0}`,
        cursor:'pointer',
        transition:'all 0.15s ease',
        display:'flex',
        flexDirection:'column',
        gap:10,
        transform: hovered ? 'translateY(-1px)' : 'none',
        boxShadow: hovered ? `0 4px 20px rgba(0,0,0,0.3),0 0 0 1px ${catColor}20` : 'none',
      }}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {/* icon badge */}
        <div style={{
          width:36,height:36,borderRadius:8,flexShrink:0,
          background:`${catColor}12`,
          border:`1px solid ${catColor}25`,
          display:'flex',alignItems:'center',justifyContent:'center',
          transition:'border-color 0.15s',
          ...(hovered?{borderColor:catColor+'50',background:`${catColor}20`}:{})
        }}>
          {iconFn ? iconFn(hovered ? catColor : catColor+'99') : (
            <span style={{color:catColor,fontSize:12,fontWeight:700}}>{item.name.slice(0,2).toUpperCase()}</span>
          )}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:C.text,fontSize:11,fontWeight:600,letterSpacing:0.3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
            {item.name}
          </div>
          <div style={{color:C.overlay,fontSize:9,marginTop:1,letterSpacing:0.3}}>{item.desc}</div>
        </div>
        <StatusDot status={item.status}/>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{background:`${catColor}15`,borderRadius:20,padding:'1px 8px',color:catColor,fontSize:8,letterSpacing:0.5,border:`1px solid ${catColor}25`}}>

        </div>
        <div style={{color:C.surface1,fontSize:8}}>{item.mem}</div>
      </div>
    </div>
  );
}

function useTime() {
  const [t, setT] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return t;
}

function useAnimatedStats() {
  const [stats, setStats] = React.useState({cpu:62,ram:51,nas:38,uptime:'22d 14h'});
  React.useEffect(() => {
    const id = setInterval(() => {
      setStats(s => ({
        ...s,
        cpu: Math.max(20, Math.min(90, s.cpu + (Math.random()-0.5)*4)),
        ram: Math.max(30, Math.min(80, s.ram + (Math.random()-0.5)*2)),
      }));
    }, 2000);
    return () => clearInterval(id);
  }, []);
  return stats;
}

function App() {
  const [activeCategory, setActiveCategory] = React.useState(() =>
    localStorage.getItem('vs-hp-cat') || ALL_KEY
  );
  const time = useTime();
  const stats = useAnimatedStats();
  const [tweakOpen, setTweakOpen] = React.useState(false);
  const [tweakCompact, setTweakCompact] = React.useState(false);

  React.useEffect(() => {
    localStorage.setItem('vs-hp-cat', activeCategory);
  }, [activeCategory]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const visibleCategories = activeCategory === ALL_KEY
    ? Object.entries(SERVICES)
    : Object.entries(SERVICES).filter(([k]) => k === activeCategory);

  const totalServices = Object.values(SERVICES).reduce((a,cat)=>a+cat.items.length, 0);
  const upServices = Object.values(SERVICES).reduce((a,cat)=>a+cat.items.filter(i=>i.status==='up').length, 0);

  const StatBar = ({label, value, color}) => (
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      <span style={{color:C.overlay,fontSize:8,letterSpacing:1,width:28}}>{label}</span>
      <div style={{width:48,height:3,background:C.surface0,borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${value}%`,background:color,borderRadius:2,transition:'width 1.5s ease'}}/>
      </div>
      <span style={{color,fontSize:8,width:28}}>{Math.round(value)}%</span>
    </div>
  );

  const timeStr = time.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const dateStr = time.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});

  const gridCols = tweakCompact
    ? 'repeat(auto-fill, minmax(150px, 1fr))'
    : 'repeat(auto-fill, minmax(190px, 1fr))';

  return (
    <div style={{width:'100vw',height:'100vh',background:C.bg,display:'flex',flexDirection:'column',overflow:'hidden'}}>

      {/* TOP BAR */}
      <div style={{height:52,background:C.crust,borderBottom:`1px solid ${C.surface0}`,display:'flex',alignItems:'center',padding:'0 20px',gap:16,flexShrink:0}}>
        {/* logo */}
        <div style={{display:'flex',alignItems:'center',gap:8,paddingRight:16,borderRight:`1px solid ${C.surface0}`}}>
          <VLogo size={24}/>
          <span style={{color:C.text,fontSize:12,fontWeight:600,letterSpacing:2}}>varoserver</span>
        </div>

        {/* stats */}
        <div style={{display:'flex',gap:14,alignItems:'center'}}>
          <StatBar label="CPU" value={stats.cpu} color={C.mauve}/>
          <StatBar label="RAM" value={stats.ram} color={C.blue}/>
          <StatBar label="NAS" value={stats.nas} color={C.green}/>
        </div>

        {/* divider */}
        <div style={{width:1,height:20,background:C.surface0}}/>

        {/* uptime + services */}
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <div style={{borderRadius:20,padding:'2px 10px',border:`1px solid ${C.green}30`,color:C.green,fontSize:8,background:`${C.green}0d`,letterSpacing:0.5}}>● NOMINAL</div>
          <span style={{color:C.overlay,fontSize:8}}>{upServices}/{totalServices} servicios</span>
          <span style={{color:C.surface1,fontSize:8}}>⬆ {stats.uptime}</span>
        </div>

        {/* spacer */}
        <div style={{flex:1}}/>

        {/* time */}
        <div style={{textAlign:'right'}}>
          <div style={{color:C.subtext,fontSize:11,fontWeight:600,letterSpacing:1,fontVariantNumeric:'tabular-nums'}}>{timeStr}</div>
          <div style={{color:C.overlay,fontSize:8,letterSpacing:1}}>{dateStr} · varoserver</div>
        </div>

        {/* ip */}
        <div style={{borderLeft:`1px solid ${C.surface0}`,paddingLeft:14}}>
          <div style={{color:C.overlay,fontSize:8,letterSpacing:1}}>192.168.1.56</div>
          <div style={{color:C.surface1,fontSize:7,letterSpacing:1}}>Intel N150 · 16GB</div>
        </div>
      </div>

      <div style={{flex:1,display:'flex',overflow:'hidden'}}>

        {/* SIDEBAR */}
        <div style={{width:196,background:C.mantle,borderRight:`1px solid ${C.surface0}`,display:'flex',flexDirection:'column',padding:'16px 10px',gap:4,flexShrink:0}}>
          {/* all */}
          <SidebarItem
            label="Todos los servicios"
            icon="◉"
            color={C.mauve}
            count={totalServices}
            active={activeCategory===ALL_KEY}
            onClick={()=>setActiveCategory(ALL_KEY)}
          />
          <div style={{height:1,background:C.surface0,margin:'6px 0'}}/>

          {Object.entries(SERVICES).map(([key,cat])=>(
            <SidebarItem key={key}
              label={cat.label}
              icon={cat.icon}
              color={cat.color}
              count={cat.items.length}
              active={activeCategory===key}
              onClick={()=>setActiveCategory(key)}
            />
          ))}

          {/* diane status at bottom */}
          <div style={{marginTop:'auto',background:`${C.blue}08`,borderRadius:8,padding:'10px 12px',border:`1px solid ${C.blue}20`}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <VLogo size={18} color={C.blue} aL={C.blue} aR={C.sapphire}/>
              <span style={{color:C.blue,fontSize:10,fontWeight:600,letterSpacing:1}}>diane</span>
              <div style={{width:5,height:5,borderRadius:'50%',background:C.green,boxShadow:`0 0 5px ${C.green}`,marginLeft:'auto'}}/>
            </div>
            <div style={{color:C.overlay,fontSize:8,lineHeight:1.5}}>Gemma 4 26B<br/>192.168.1.136:11434</div>
          </div>
        </div>

        {/* MAIN */}
        <div style={{flex:1,overflow:'auto',padding:'20px 24px'}}>
          {visibleCategories.map(([key,cat])=>(
            <div key={key} style={{marginBottom:28}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <span style={{color:cat.color,fontSize:14}}>{cat.icon}</span>
                <span style={{color:C.text,fontSize:12,fontWeight:600,letterSpacing:1}}>{cat.label}</span>
                <div style={{height:1,flex:1,background:C.surface0,marginLeft:8}}/>
                <span style={{color:C.overlay,fontSize:8,letterSpacing:1}}>{cat.items.filter(i=>i.status==='up').length}/{cat.items.length} up</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:gridCols,gap:10}}>
                {cat.items.map(item=>(
                  <ServiceCard key={item.name} item={item} catColor={cat.color}/>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* TWEAKS */}
      {tweakOpen && (
        <div style={{position:'fixed',bottom:20,right:20,background:C.crust,border:`1px solid ${C.mauve}40`,borderRadius:10,padding:18,zIndex:9999,width:220,boxShadow:'0 8px 40px rgba(0,0,0,0.6)'}}>
          <div style={{color:C.mauve,fontSize:11,fontWeight:600,letterSpacing:2,marginBottom:14}}>TWEAKS</div>
          <div style={{marginBottom:12}}>
            <div style={{color:C.overlay,fontSize:9,letterSpacing:1,marginBottom:6}}>VISTA DE CARDS</div>
            <div style={{display:'flex',gap:6}}>
              {[['Normal',false],['Compacta',true]].map(([l,v])=>(
                <button key={l} onClick={()=>setTweakCompact(v)}
                  style={{flex:1,padding:'4px 0',borderRadius:4,border:`1px solid ${tweakCompact===v?C.mauve:'rgba(255,255,255,0.1)'}`,background:tweakCompact===v?`${C.mauve}20`:'transparent',color:tweakCompact===v?C.mauve:C.overlay,fontSize:9,cursor:'pointer'}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div style={{color:C.overlay,fontSize:8,lineHeight:1.6,borderTop:`1px solid ${C.surface0}`,paddingTop:10,marginTop:4}}>
            Stats CPU/RAM animados en vivo<br/>
            Sidebar filtra por categoría
          </div>
        </div>
      )}
    </div>
  );
}

function SidebarItem({label,icon,color,count,active,onClick}) {
  const [hov, setHov] = React.useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        padding:'7px 10px',borderRadius:7,cursor:'pointer',
        background: active ? `${color}15` : hov ? `${C.surface0}80` : 'transparent',
        border: `1px solid ${active ? color+'30' : 'transparent'}`,
        display:'flex',alignItems:'center',gap:8,
        transition:'all 0.12s',
      }}>
      <span style={{color: active||hov ? color : C.overlay,fontSize:11,width:16,textAlign:'center'}}>{icon}</span>
      <span style={{color: active ? color : hov ? C.subtext : C.overlay,fontSize:10,flex:1,letterSpacing:0.3,fontWeight:active?600:400}}>{label}</span>
      <span style={{color:C.surface1,fontSize:8,background:C.surface0,borderRadius:10,padding:'1px 6px'}}>{count}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
