<style>
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    background: #1e1e2e;
    font-family: 'JetBrains Mono', monospace;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  @media print {
    @page { size: A4 landscape; margin: 0.6cm; }
    body { background: #1e1e2e !important; }
    .page { break-after: page; break-inside: avoid; }
    .page:last-child { break-after: auto; }
  }

  .page {
    width: 277mm;
    min-height: 190mm;
    background: #1e1e2e;
    padding: 14mm 12mm;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10mm;
  }

  /* topbar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #11111b;
    border: 1px solid #313244;
    border-radius: 8px;
    padding: 8px 16px;
    flex-shrink: 0;
  }
  .topbar-logo { display:flex; align-items:center; gap:8px; padding-right:14px; border-right:1px solid #313244; }
  .topbar-name { color:#cdd6f4; font-size:11px; font-weight:600; letter-spacing:2px; }
  .topbar-stat { display:flex; align-items:center; gap:5px; }
  .topbar-stat-label { color:#6c7086; font-size:7px; letter-spacing:1px; width:24px; }
  .topbar-stat-bar { width:40px; height:2px; background:#313244; border-radius:1px; overflow:hidden; }
  .topbar-stat-fill { height:100%; border-radius:1px; }
  .topbar-stat-val { font-size:7px; width:24px; }
  .topbar-badge { border-radius:20px; padding:2px 9px; font-size:7px; letter-spacing:.5px; border-width:1px; border-style:solid; }
  .topbar-spacer { flex:1; }
  .topbar-time { text-align:right; }
  .topbar-time-main { color:#a6adc8; font-size:10px; font-weight:600; letter-spacing:1px; }
  .topbar-time-sub { color:#6c7086; font-size:7px; letter-spacing:1px; }
  .topbar-ip { border-left:1px solid #313244; padding-left:12px; }
  .topbar-ip div { color:#6c7086; font-size:7px; letter-spacing:1px; }

  /* content area */
  .content { display:flex; gap:10mm; flex:1; }

  /* sidebar */
  .sidebar {
    width: 44mm;
    background: #181825;
    border: 1px solid #313244;
    border-radius: 8px;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex-shrink: 0;
  }
  .sidebar-item {
    display:flex; align-items:center; gap:7px;
    padding: 5px 8px; border-radius:6px;
    border: 1px solid transparent;
  }
  .sidebar-item.active { background:rgba(203,166,247,0.1); border-color:rgba(203,166,247,0.25); }
  .sidebar-icon { font-size:10px; width:14px; text-align:center; }
  .sidebar-label { font-size:8px; flex:1; letter-spacing:.3px; }
  .sidebar-count { font-size:7px; background:#313244; border-radius:10px; padding:1px 5px; color:#45475a; }
  .sidebar-divider { height:1px; background:#313244; margin:4px 0; }
  .sidebar-diane {
    margin-top:auto;
    background:rgba(137,180,250,0.06);
    border:1px solid rgba(137,180,250,0.2);
    border-radius:7px;
    padding:8px 10px;
  }
  .sidebar-diane-row { display:flex; align-items:center; gap:7px; margin-bottom:3px; }
  .sidebar-diane-name { color:#89b4fa; font-size:9px; font-weight:600; letter-spacing:1px; }
  .sidebar-diane-dot { width:5px; height:5px; border-radius:50%; background:#a6e3a1; margin-left:auto; }
  .sidebar-diane-info { color:#6c7086; font-size:7px; line-height:1.5; }

  /* main grid */
  .main { flex:1; display:flex; flex-direction:column; gap:8mm; }
  .section-header { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
  .section-icon { font-size:12px; }
  .section-title { font-size:10px; font-weight:600; letter-spacing:1px; color:#cdd6f4; }
  .section-line { flex:1; height:1px; background:#313244; margin-left:6px; }
  .section-count { font-size:7px; letter-spacing:1px; color:#6c7086; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(54mm,1fr)); gap:5px; }

  /* card */
  .card {
    background: #181825;
    border: 1px solid #313244;
    border-radius: 8px;
    padding: 9px 11px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    break-inside: avoid;
  }
  .card-top { display:flex; align-items:center; gap:8px; }
  .card-icon-badge {
    width:28px; height:28px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .card-name { font-size:9px; font-weight:600; color:#cdd6f4; letter-spacing:.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-desc { font-size:7px; color:#6c7086; margin-top:1px; letter-spacing:.3px; }
  .card-bot { display:flex; align-items:center; justify-content:space-between; }
  .card-port { border-radius:20px; padding:1px 7px; font-size:7px; letter-spacing:.4px; border-width:1px; border-style:solid; }
  .card-mem { font-size:7px; color:#45475a; }
  .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot-up { background:#a6e3a1; }
  .dot-paused { background:#6c7086; }
  .dot-down { background:#f38ba8; }

  /* page number */
  .page-num { position:absolute; bottom:6mm; right:12mm; color:#45475a; font-size:7px; letter-spacing:1px; }

</head>

const upServices    = SERVICES.reduce((a,c)=>a+c.items.filter(i=>i.status==='up').length,0);

function VLogo({size=22, color=C.mauve, aL=C.blue, aR=C.green}) {
  const n = [{x:6,y:8,r:3.5,c:color},{x:17,y:26,r:2.5,c:color,o:0.75},{x:28,y:48,r:4,c:aL},{x:39,y:26,r:2.5,c:color,o:0.75},{x:50,y:8,r:3.5,c:aR},{x:11,y:17,r:1.5,c:color,o:0.45},{x:23,y:37,r:1.5,c:aL,o:0.45},{x:33,y:37,r:1.5,c:aL,o:0.45},{x:45,y:17,r:1.5,c:aR,o:0.45}];
  const e = [[0,5],[5,1],[1,6],[6,2],[4,8],[8,3],[3,7],[7,2]];
  return (
    <svg width={size} height={size} viewBox="-8 0 72 64" fill="none">
      {e.map(([a,b],i)=>(<line key={i} x1={n[a].x} y1={n[a].y} x2={n[b].x} y2={n[b].y} stroke={n[a].c} strokeWidth="1.3" opacity="0.6"/>))}
      {n.map((nd,i)=>(<circle key={i} cx={nd.x} cy={nd.y} r={nd.r} fill={nd.c} opacity={nd.o??1}/>))}
    </svg>
  );
}

function Topbar() {
  return (
    <div className="topbar">
      <div className="topbar-logo">
        <VLogo size={20}/>
        <span className="topbar-name">varoserver</span>
      </div>
      {[['CPU',62,C.mauve],['RAM',51,C.blue],['NAS',38,C.green]].map(([l,v,c])=>(
        <div key={l} className="topbar-stat">
          <span className="topbar-stat-label">{l}</span>
          <div className="topbar-stat-bar"><div className="topbar-stat-fill" style={{width:`${v}%`,background:c}}/></div>
          <span className="topbar-stat-val" style={{color:c}}>{v}%</span>
        </div>
      ))}
      <div style={{width:1,height:16,background:'#313244'}}/>
      <span className="topbar-badge" style={{color:C.green,borderColor:C.green+'30',background:C.green+'0d'}}>● NOMINAL</span>
      <span style={{color:C.overlay,fontSize:'7px'}}>{upServices}/{totalServices} servicios</span>
      <span style={{color:'#45475a',fontSize:'7px'}}>⬆ 22d 14h</span>
      <div className="topbar-spacer"/>
      <div className="topbar-time">
        <div className="topbar-time-main">varoserver · v22.8</div>
        <div className="topbar-time-sub">27 abr 2026 · brand system</div>
      </div>
      <div className="topbar-ip">
        <div>192.168.1.56</div>
        <div>Intel N150 · 16GB</div>
      </div>
    </div>
  );
}

function Sidebar({activePage}) {
  return (
    <div className="sidebar">
      <div className="sidebar-item active" style={{background:'rgba(203,166,247,0.1)',borderColor:'rgba(203,166,247,0.25)'}}>
        <span className="sidebar-icon" style={{color:C.mauve}}>◉</span>
        <span className="sidebar-label" style={{color:C.mauve,fontWeight:600}}>Todos los servicios</span>
        <span className="sidebar-count">{totalServices}</span>
      </div>
      <div className="sidebar-divider"/>
      {SERVICES.map(cat=>(
        <div key={cat.key} className="sidebar-item">
          <span className="sidebar-icon" style={{color:cat.color}}>{cat.icon}</span>
          <span className="sidebar-label" style={{color:C.overlay}}>{cat.label}</span>
          <span className="sidebar-count">{cat.items.length}</span>
        </div>
      ))}
      <div className="sidebar-diane">
        <div className="sidebar-diane-row">
          <VLogo size={16} color={C.blue} aL={C.blue} aR={C.sapphire}/>
          <span className="sidebar-diane-name">diane</span>
          <div className="sidebar-diane-dot"/>
        </div>
        <div className="sidebar-diane-info">Gemma 4 26B<br/>192.168.1.136</div>
      </div>
    </div>
  );
}

function Card({item, color}) {
  const iconFn = ICONS[item.ico];
  const dotCls = item.status==='up'?'dot dot-up':item.status==='paused'?'dot dot-paused':'dot dot-down';
  return (
    <div className="card" style={{borderColor: color+'20'}}>
      <div className="card-top">
        <div className="card-icon-badge" style={{background:`${color}12`,border:`1px solid ${color}30`}}>
          {iconFn ? iconFn(color+'cc', 14) : <span style={{color,fontSize:'9px',fontWeight:700}}>{item.name.slice(0,2)}</span>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div className="card-name">{item.name}</div>
          <div className="card-desc">{item.desc}</div>
        </div>
        <div className={dotCls}/>
      </div>
      <div className="card-bot">
        <span className="card-port" style={{color,borderColor:`${color}30`,background:`${color}12`}}>
          {item.port ? `:${item.port}` : 'polling'}
        </span>
        <span className="card-mem">{item.mem}</span>
      </div>
    </div>
  );
}

// Split services into pages — page 1: infra + ai + smarthome, page 2: prod + media, page 3: gaming + apps
const PAGES = [
  SERVICES.filter(s=>['infra','ai','smarthome'].includes(s.key)),
  SERVICES.filter(s=>['prod','media'].includes(s.key)),
  SERVICES.filter(s=>['gaming','apps'].includes(s.key)),
];

function Page({cats, pageNum, total}) {
  return (
    <div className="page">
      <Topbar/>
      <div className="content">
        <Sidebar/>
        <div className="main">
          {cats.map(cat=>(
            <div key={cat.key}>
              <div className="section-header">
                <span className="section-icon" style={{color:cat.color}}>{cat.icon}</span>
                <span className="section-title">{cat.label}</span>
                <div className="section-line"/>
                <span className="section-count">{cat.items.filter(i=>i.status==='up').length}/{cat.items.length} up</span>
              </div>
              <div className="grid">
                {cat.items.map(item=><Card key={item.name} item={item} color={cat.color}/>)}
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="page-num">varoserver · {pageNum}/{total}</div>
    </div>
  );
}

function App() {
  return (
    <div>
      {PAGES.map((cats,i)=>(
        <Page key={i} cats={cats} pageNum={i+1} total={PAGES.length}/>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// auto-print after fonts + babel settle
document.fonts.ready.then(() => {
  setTimeout(() => window.print(), 500);
});
</script>
</body>
</html>
