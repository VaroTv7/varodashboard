<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="VaroDashboard — A highly customizable self-hosted dashboard" />
		<meta name="theme-color" content="#0a0e1a" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<title>VaroDashboard</title>
		<script>
			// Prevent FOUC: apply theme before paint
			(function() {
				try {
					const saved = localStorage.getItem('varodashboard-theme');
					if (saved) document.documentElement.setAttribute('data-theme', saved);
				} catch(e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body>
		<div id="app">%sveltekit.body%</div>
	</body>
</html>
